# Unraid / production compose using a prebuilt GitHub Container Registry image.
# Replace OWNER with your GitHub username or organization.
services:
  ratiosplit-app:
    image: ghcr.io/OWNER/ratiosplit:latest
    container_name: ratiosplit-app
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/data/ratiosplit.db
      APP_BASE_CURRENCY: HUF
      APP_DEFAULT_LOCALE: hu-HU
      APP_TIMEZONE: Europe/Budapest
    ports:
      - "3000:3000"
    volumes:
      - /mnt/user/appdata/ratiosplit/data:/data
